<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Room | SkillClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/components.css" rel="stylesheet">
  </head>
  <body data-page="create-room">
    <div class="page-shell">
      <header data-app-nav></header>
      <main class="main-content">
        <section class="container section-pad">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-7 col-xl-6">
              <div class="mb-4">
                <span class="sc-pill mb-3">Host console</span>
                <h1 class="h1 fw-black">Create a quiz room</h1>
                <p class="text-slate-400">Set battle details and open a lobby for players.</p>
              </div>
              <form id="createRoomForm" class="sc-card p-4 vstack gap-3">
                <div>
                  <label class="form-label" for="roomName">Room Name</label>
                  <input class="form-control form-control-lg focus-ring" id="roomName" name="roomName" placeholder="Friday Java Clash" required>
                </div>
                <div>
                  <label class="form-label" for="maxPlayers">Max Players</label>
                  <input class="form-control form-control-lg focus-ring" id="maxPlayers" name="maxPlayers" type="number" min="2" max="50" value="8" required>
                </div>
                <div>
                  <label class="form-label" for="category">Category</label>
                  <select class="form-select form-select-lg focus-ring" id="category" name="category" required></select>
                </div>
                <button class="btn sc-btn-primary btn-lg mt-2 focus-ring" type="submit">Create Room</button>
              </form>
            </div>
          </div>
        </section>
      </main>
      <div data-app-footer></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/room.js"></script>
    <script src="../js/page-init.js"></script>
  </body>
</html>
