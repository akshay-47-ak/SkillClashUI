<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join Room | SkillClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/components.css" rel="stylesheet">
  </head>
  <body data-page="join-room">
    <div class="page-shell">
      <header data-app-nav></header>
      <main class="main-content">
        <section class="container section-pad">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-7 col-xl-6">
              <div class="mb-4">
                <span class="sc-pill mb-3">Player entry</span>
                <h1 class="h1 fw-black">Join a room</h1>
                <p class="text-slate-400">Enter the room code from your host and choose your battle name.</p>
              </div>
              <form id="joinRoomForm" class="sc-card p-4 vstack gap-3">
                <div>
                  <label class="form-label" for="roomCodeInput">Room Code</label>
                  <input class="form-control form-control-lg text-uppercase focus-ring" id="roomCodeInput" name="roomCode" placeholder="NEON42" maxlength="12" required>
                </div>
                <div>
                  <label class="form-label" for="username">Username</label>
                  <input class="form-control form-control-lg focus-ring" id="username" name="username" placeholder="Your player name" required>
                </div>
                <button class="btn sc-btn-primary btn-lg mt-2 focus-ring" type="submit">Join Room</button>
              </form>
            </div>
          </div>
        </section>
      </main>
      <div data-app-footer></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/room.js"></script>
    <script src="../js/page-init.js"></script>
  </body>
</html>
