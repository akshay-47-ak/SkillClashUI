<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lobby | SkillClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/components.css" rel="stylesheet">
  </head>
  <body data-page="lobby">
    <div class="page-shell">
      <header data-app-nav></header>
      <main class="main-content">
        <section class="container section-pad">
          <div class="row g-4">
            <div class="col-12 col-lg-5">
              <div class="sc-card p-4 h-100">
                <span class="sc-pill mb-3"><span class="status-dot"></span><span data-socket-status>connecting</span></span>
                <h1 id="roomName" class="h2 fw-black mb-3">Skill Battle</h1>
                <div class="vstack gap-3">
                  <div class="sc-card-muted p-3 d-flex justify-content-between align-items-center">
                    <span>Room Code</span>
                    <div class="d-flex align-items-center gap-2">
                      <strong id="roomCode" class="h5 mb-0"></strong>
                      <button id="copyCodeBtn" class="btn sc-btn-ghost btn-sm" type="button">Copy</button>
                    </div>
                  </div>
                  <div class="sc-card-muted p-3 d-flex justify-content-between"><span>Category</span><strong id="roomCategory"></strong></div>
                  <div class="sc-card-muted p-3 d-flex justify-content-between"><span>Online Count</span><strong id="playerCount"></strong></div>
                </div>
                <button id="startMatchBtn" class="btn sc-btn-primary btn-lg w-100 mt-4 focus-ring" type="button">Start Match</button>
              </div>
            </div>
            <div class="col-12 col-lg-7">
              <div class="sc-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h2 class="h4 fw-black mb-0">Members</h2>
                  <span class="badge rounded-pill text-bg-dark border">Lobby</span>
                </div>
                <ul id="membersList" class="list-unstyled vstack gap-3 mb-0"></ul>
              </div>
            </div>
          </div>
        </section>
      </main>
      <div data-app-footer></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/lobby.js"></script>
    <script src="../js/page-init.js"></script>
  </body>
</html>
