<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz Battle | SkillClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/components.css" rel="stylesheet">
  </head>
  <body data-page="quiz">
    <div class="page-shell">
      <header data-app-nav></header>
      <main class="main-content">
        <section class="container section-pad">
          <div class="row g-4">
            <div class="col-12 col-lg-8">
              <div class="sc-card p-4">
                <div class="d-flex flex-column flex-sm-row gap-3 justify-content-between align-items-sm-center mb-4">
                  <div>
                    <span id="questionCounter" class="text-slate-400 fw-bold"></span>
                    <h1 id="questionText" class="h3 fw-black mt-2 mb-0"></h1>
                  </div>
                  <div class="timer-ring"><span id="timerValue">20</span></div>
                </div>
                <div class="progress bg-slate-800 mb-4" role="progressbar" aria-label="Quiz progress">
                  <div id="quizProgress" class="progress-bar sc-progress-bar"></div>
                </div>
                <div id="optionsList" class="vstack gap-3"></div>
                <button id="submitAnswerBtn" class="btn sc-btn-primary btn-lg w-100 mt-4 focus-ring" type="button">Submit Answer</button>
              </div>
            </div>
            <aside class="col-12 col-lg-4">
              <div class="sc-card p-4 mb-3">
                <div class="text-slate-400 fw-bold">Your Score</div>
                <div id="scoreValue" class="display-5 fw-black">0</div>
              </div>
              <div class="sc-card p-4">
                <h2 class="h5 fw-black mb-3">Live Score</h2>
                <div id="liveScores" class="vstack"></div>
              </div>
            </aside>
          </div>
        </section>
      </main>
      <div data-app-footer></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/quiz.js"></script>
    <script src="../js/page-init.js"></script>
  </body>
</html>
