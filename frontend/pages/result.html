<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Results | SkillClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/components.css" rel="stylesheet">
  </head>
  <body data-page="result">
    <div class="page-shell">
      <header data-app-nav></header>
      <main class="main-content">
        <section class="container section-pad">
          <div class="row g-4">
            <div class="col-12 col-lg-5">
              <div class="sc-card p-4 h-100 text-center">
                <span class="sc-pill mb-4">Winner</span>
                <div class="display-1 fw-black text-gradient" id="winnerName">Player</div>
                <p class="text-slate-400 mb-1">Final Score</p>
                <div class="display-5 fw-black" id="winnerScore">0</div>
                <div class="sc-card-muted p-3 mt-4">Room <strong id="resultRoomCode"></strong></div>
                <button id="playAgainBtn" class="btn sc-btn-primary btn-lg w-100 mt-4 focus-ring" type="button">Play Again</button>
              </div>
            </div>
            <div class="col-12 col-lg-7">
              <div class="sc-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h1 class="h3 fw-black mb-0">Final Rankings</h1>
                  <span class="badge rounded-pill text-bg-dark border">Leaderboard</span>
                </div>
                <div class="table-responsive">
                  <table class="table align-middle">
                    <thead>
                      <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th class="text-end">Score</th>
                      </tr>
                    </thead>
                    <tbody id="rankingTable"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
      <div data-app-footer></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/result.js"></script>
    <script src="../js/page-init.js"></script>
  </body>
</html>
